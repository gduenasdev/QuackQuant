services:
  web:
    image: caddy:2-alpine
    container_name: quackquant-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${QUACKQUANT_HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/srv/index.html:ro
      - ./styles.css:/srv/styles.css:ro
      - ./images:/srv/images:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: quackquant-api:local
    container_name: quackquant-api
    environment:
      QUACKQUANT_ENVIRONMENT: production
      QUACKQUANT_API_PREFIX: /api/v1
      QUACKQUANT_ALLOWED_ORIGINS: '["http://localhost:${QUACKQUANT_HTTP_PORT:-8080}","http://127.0.0.1:${QUACKQUANT_HTTP_PORT:-8080}","http://${MAC_STUDIO_HOSTNAME:-localhost}:${QUACKQUANT_HTTP_PORT:-8080}"]'
      QUACKQUANT_OLLAMA_BASE_URL: ${QUACKQUANT_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
